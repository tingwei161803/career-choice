<script>
(function () {
  var root = document.getElementById('blocks');
  if (!root || !window.CC) return;
  CC.ORDER.forEach(function (k, i) {
    var c = CC.COMPANIES[k];
    var sec = document.createElement('section');
    sec.className = 'company-block reveal';
    sec.id = k;
    sec.style.setProperty('--co', c.color);
    sec.style.setProperty('--co-soft', c.colorSoft);

    var dims = c.dimensions.map(function (d) {
      return '<div class="dim"><h4>' + d.h + '</h4><p>' + d.t + '</p></div>';
    }).join('');

    var sal = c.salary.map(function (s) {
      return '<tr><td class="lv">' + s.lv + '</td><td class="rg">' + s.range + '</td><td class="nt">' + s.note + '</td></tr>';
    }).join('');

    var pros = c.pros.map(function (p) { return '<li>' + p + '</li>'; }).join('');
    var cons = c.cons.map(function (p) { return '<li>' + p + '</li>'; }).join('');
    var tags = c.examples.map(function (e) { return '<span>' + e + '</span>'; }).join('');

    sec.innerHTML =
      '<div class="wrap">' +
        '<div class="company-head">' +
          '<span class="ord">0' + (i + 1) + '</span>' +
          '<h2>' + c.name + '</h2>' +
          '<span class="pill">' + c.quadrant + '</span>' +
          '<span class="pill" style="background:var(--co-soft)">核心修煉 · ' + c.ability + '</span>' +
        '</div>' +
        '<p class="company-lead">' + c.oneLiner + '</p>' +
        '<div class="dim-grid">' + dims + '</div>' +
        '<div class="info-cols">' +
          '<div>' +
            '<h4 style="color:var(--co);margin-bottom:14px">薪資範圍（約略區間）</h4>' +
            '<table class="salary-table"><thead><tr><th>職級</th><th>年薪</th><th>說明</th></tr></thead><tbody>' + sal + '</tbody></table>' +
            '<p class="salary-foot">' + c.salaryNote + '</p>' +
          '</div>' +
          '<div class="proscons">' +
            '<div class="pc pros"><h5>優點</h5><ul>' + pros + '</ul></div>' +
            '<div class="pc cons"><h5>缺點</h5><ul>' + cons + '</ul></div>' +
          '</div>' +
        '</div>' +
        '<div class="fit-row">' +
          '<div class="fb"><div class="k">適合的人格特質</div><div class="v">' + c.fit + '</div></div>' +
          '<div class="fb"><div class="k">適合的職涯階段</div><div class="v">' + c.stageFit + '</div></div>' +
          '<div class="fb"><div class="k">代表企業 / 產業</div><div class="tags">' + tags + '</div></div>' +
        '</div>' +
      '</div>';
    root.appendChild(sec);
  });

  // reveal
  document.querySelectorAll('.company-block.reveal').forEach(function (el) {
    if ('IntersectionObserver' in window) {
      new IntersectionObserver(function (es, o) {
        es.forEach(function (e) { if (e.isIntersecting) { e.target.classList.add('in'); o.disconnect(); } });
      }, { threshold: 0.06 }).observe(el);
    } else { el.classList.add('in'); }
  });

  // 若帶 hash，捲動定位
  if (location.hash) {
    var t = document.getElementById(location.hash.slice(1));
    if (t) setTimeout(function () { t.scrollIntoView({ behavior: 'smooth' }); }, 200);
  }
})();
</script>
